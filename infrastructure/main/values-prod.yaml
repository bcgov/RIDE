nameOverride: prod-ride
fullnameOverride: prod-ride

# These global values are used by all components of the application.
global:
  vault:
    licenceplate: f4dbc3 # This is the license plate you are deploying to. It is used to determine the vault path
    environment: prod #Set to prod if you want to use the prod vault or nonprod for dev/test/uat
  release: # This is set by Github actions for the prod release. Do not change this value.
  branch: # This is set by Github actions for the branch name. Do not change this value.
  image:
    tag: latest-prod

webapp:
  enabled: true
  nameOverride: prod-ride-webapp
  fullnameOverride: prod-ride-webapp
  replicaCount: 3 # Number of replicas to deploy

  image:
    repository: ghcr.io/bcgov/ride-webapp

  prometheus:
    enabled: false # If you have prometheus metrics in the app, set to true so sysdig can scrape them.

  vault:
    secretName: prod-webapp  # This is the name of the secret in vault that contains the environment variables for the app
    authPath: auth/k8s-gold # Must match cluster. Use one of: k8s-silver, k8s-gold, k8s-golddr, k8s-emerald

  deployment:
    strategy: RollingUpdate # Can be Recreate or RollingUpdate
    resources:
      requests:
        cpu: 10m
        memory: 200Mi
      limits:
        memory: 600Mi
    env:
      postgresSecret: prod-ride-db-crunchy-pguser-prod-ride-db # This is the name of the secret generated by Crunchy for the database
      variables:
        SHOW_DEBUG_TOOLBAR: 'False' # Set to False for UAT and Prod
        DEBUG: 'False' # Set to False for UAT and Prod

  podDisruptionBudget: 
    enabled: true # If you have more than 1 replica, you can set this to true. Will also check to ensure more than 1 replica set to prevent issues
    minAvailable: 1 


static:
  enabled: true
  nameOverride: prod-ride-static
  fullnameOverride: prod-ride-static
  replicaCount: 3 # Number of replicas to deploy

  image:
    repository: ghcr.io/bcgov/ride-static

  prometheus:
    enabled: false # If you have prometheus metrics in the app, set to true so sysdig can scrape them.

  vault:
    secretName: prod-static  # This is the name of the secret in vault that contains the environment variables for the app
    authPath: auth/k8s-gold # Must match cluster. Use one of: k8s-silver, k8s-gold, k8s-golddr, k8s-emerald

  deployment:
    strategy: RollingUpdate # Can be Recreate or RollingUpdate
    resources:
      requests:
        cpu: 10m
        memory: 50Mi
      limits:
        memory: 250Mi
    env:
      variables:
        ENVIRONMENT: 'prod' # Set to dev, test, uat, prod
        SHOW_DEBUG_TOOLBAR: 'False' # Creates the route for the debug toolbar. Set to False for UAT and Prod
        MAINTENANCE_MODE: 'False'

  route:
    host: prod-ride.apps.gold.devops.gov.bc.ca # The host name for the route
    # NOTE: For Vanity URL, this will only do the initial install of the URL. Once created it WILL NOT update it or delete it. This must be done manually
    # because you would most likely have set a certificate on the route and updating it or deleting it could cause issues.
    vanityurl: true #Set to true if you want to use a vanity URL. This will require a certificate in the cluster (set manually) and dns entry
    vanityurlhost: ride.th.gov.bc.ca  #The path to use for the vanity URL

  podDisruptionBudget: 
    enabled: true # If you have more than 1 replica, you can set this to true. Will also check to ensure more than 1 replica set to prevent issues
    minAvailable: 1 

redis:
  fullnameOverride: prod-ride-redis
  nameOverride: prod-ride-redis
  replicaCount: 1
  rbac:
    create: false # The pipeline account is not able to create or update the rbac, so you set this to true for the initial deployment and can for local upgrades but set to false otherwise.
  image:
    repository: ghcr.io/bcgov/ride-redis
    tag: latest-prod
  deployment:
    resources:
      requests:
        cpu: 5m
        memory: 64Mi
      limits:
        memory: 128Mi
    env:    
      variables: {}
  podDisruptionBudget: 
    enabled: true 
    minAvailable: 1

tasks:
  fullnameOverride: prod-ride-tasks
  nameOverride: prod-ride-tasks
  replicaCount: 3 # Set to 1 for dev/test. In uat/prod we want at least 2 replicas for high availability, which we can do because it uses Kubernetes leases
  rbac:
    namespace: f4dbc3 # The namespace to use for the rbac. This is the same as the vault license plate. It is used to determine the vault path
    create: false # The pipeline account is not able to create or update the rbac, so you set this to true for the initial deployment and can for local upgrades but set to false otherwise.
  image:
    repository: ghcr.io/bcgov/ride-webapp
    tag: latest-prod
  deployment:
    resources:
      requests:
        cpu: 50m
        memory: 200Mi
      limits:
        memory: 1000Mi
    env:
      postgresSecret: prod-ride-db-crunchy-pguser-prod-ride-db
      variables:
        DEBUG: 'False' # Set to False for UAT and Prod
        ROOT_LOG_LEVEL: WARNING
  vault:
    secretName: prod-webapp  # This is the name of the secret in vault that contains the environment variables for the app
    authPath: auth/k8s-gold # Must match cluster. Use one of: k8s-silver, k8s-gold, k8s-golddr, k8s-emerald
  prometheus:
    enabled: false # If you have prometheus metrics in the app, set to true so sysdig can scrape them.
  podDisruptionBudget: 
    enabled: true 
    minAvailable: 1