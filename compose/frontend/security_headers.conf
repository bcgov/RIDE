add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header Permissions-Policy "geolocation=(self), fullscreen=(self)";
add_header X-Content-Type-Options "nosniff";
add_header X-Robots-Tag "noindex";
add_header Cross-Origin-Embedder-Policy "credentialless" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;
add_header Content-Security-Policy "default-src 'self' https://*.arcgis.com https://*.gov.bc.ca; script-src 'self' 'unsafe-inline' https://*.gov.bc.ca https://*.arcgis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.arcgis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.gov.bc.ca https://*.arcgis.com; img-src 'self' data: https://*.arcgis.com https://*.arcgisonline.com; worker-src 'self' blob:; object-src 'self'; form-action 'self' https://*.drivebc.ca https://*.gov.bc.ca https://*.loginproxy.gov.bc.ca https://login.microsoftonline.com https://*.microsoftonline.com; base-uri 'self'; frame-ancestors 'self';" always;