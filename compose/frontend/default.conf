gzip on; 
gzip_vary on; 
gzip_static on;
gzip_min_length 1024; 
gzip_proxied any; 
gzip_types
	text/css
	text/plain
	text/javascript
	application/javascript
	application/json
	application/x-javascript
	application/xml
	application/xml+rss
	application/xhtml+xml
	application/x-font-ttf
	application/x-font-opentype
	application/vnd.ms-fontobject
	application/wasm
	image/svg+xml
	image/x-icon
	application/rss+xml
	application/atom_xml;
    gzip_disable "MSIE [1-6]\.";

#Logging Settings

log_format ride_json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"host":"$host",'
    '"method":"$request_method",'
    '"uri":"$request_uri",'
    '"status": $status,'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"upstream_cache_status":"$upstream_cache_status",'
    '"sent_http_content_type":"$sent_http_content_type",'
    '"request_time":"$request_time",'
    '"upstream_time":"$upstream_response_time",'
    '"upstream_status":"$upstream_status",'
    '"request_id":"$request_id"'
'}';

error_log /var/log/nginx/error.log;

set_real_ip_from 10.0.0.0/8;
real_ip_header X-Forwarded-For; #Set by OpenShift Router

server {
    listen 5173;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    access_log /var/log/nginx/access.log ride_json;
    include /etc/nginx/conf.d/security_headers.conf;

    location ^~ /admin {
        allow 142.34.53.0/24;
        allow 142.22.0.0/15;
        allow 142.24.0.0/13;
        allow 142.32.0.0/13;
        allow 208.181.128.46/32; #OXD VPN
        allow 127.0.0.1;

        deny all; 
        
        proxy_ssl_server_name on;
        proxy_pass http://{ENVIRONMENT}-ride-webapp;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        include /etc/nginx/conf.d/security_headers.conf;
    }

    location ~ ^/(api|session|static|accounts) {
        proxy_ssl_server_name on;
        proxy_pass http://{ENVIRONMENT}-ride-webapp;
        proxy_connect_timeout 10s;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        include /etc/nginx/conf.d/security_headers.conf;
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|ttf|woff|woff2)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 7d;
        gzip_static on;
        include /etc/nginx/conf.d/security_headers.conf;
    }

    # Proxy requests to DriveBC's DMS API
    location ^~ /drivebc-api/dms/ {
        rewrite ^/drivebc-api/dms/(.*)$ /api/dms/$1 break;
        proxy_pass https://www.drivebc.ca;
        # clear out DBC security headers to prevent duplicates
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Cross-Origin-Embedder-Policy;
        proxy_hide_header Cross-Origin-Resource-Policy;
        proxy_hide_header X-Robots-Tag;
        
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        include /etc/nginx/conf.d/security_headers.conf;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
        gzip_static on;
        include /etc/nginx/conf.d/security_headers.conf;
    }

    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        gzip_static on; 
    }

    location ^~ /healthz {
        access_log off;
        add_header 'Content-Type' 'text/plain';
    	allow 127.0.0.1;
    	deny all;
        return 200 "healthy\n";
    }
}
